defaults:
  - model: le_admm_pre_post
  - writer: cometml
  - metrics: lensless
  - datasets: digicam
  - dataloader: digicam
  - transforms: lensless
  - _self_

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.5
  step_size: 10

loss_function:
  _target_: src.loss.combined.CombinedLoss
  lpips_weight: 1.0

trainer:
  log_step: 50
  n_epochs: 50
  epoch_len: 500
  device_tensors: [ "lensless", "psf", "lensed" ]
  resume_from: null
  device: auto
  override: false
  monitor: "max test_psnr"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 42